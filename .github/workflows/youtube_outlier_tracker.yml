name: YouTube outlier tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 0'

jobs:
  scan-outliers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate outlier spreadsheet
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_KEYWORDS: 'cold approach,infield'
          LOOKBACK_DAYS: '90'
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SPREADSHEET_ID: ${{ vars.GOOGLE_SPREADSHEET_ID }}
          GOOGLE_SHEET_NAME: 'Outliers'
        run: python youtube_outliers.py
